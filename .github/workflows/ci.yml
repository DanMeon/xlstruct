name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev --all-extras
      - name: Ruff format
        run: uv run ruff format --check src/ tests/
      - name: Ruff lint
        run: uv run ruff check src/ tests/
      - name: Mypy
        run: uv run mypy src/xlstruct/

  test:
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group dev
      - name: Run tests
        run: uv run pytest tests/ -v --ignore=tests/integration --cov=xlstruct --cov-report=term-missing --cov-fail-under=60

  integration:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --group dev --extra all-storage
      - name: Start emulators
        run: docker compose -f tests/integration/docker-compose.yml up -d --wait
      - name: Run integration tests
        run: uv run pytest tests/integration/ -v
      - name: Stop emulators
        if: always()
        run: docker compose -f tests/integration/docker-compose.yml down
