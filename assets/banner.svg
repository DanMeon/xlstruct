<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Green accent -->
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" rx="12" fill="url(#bg)"/>
  <rect width="960" height="320" rx="12" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="80" cy="60" r="120" fill="#38bdf8" opacity="0.03"/>
  <circle cx="880" cy="260" r="150" fill="#818cf8" opacity="0.03"/>

  <!-- === Excel Icon (left) === -->
  <g transform="translate(216, 100)">
    <!-- Sheet shadow -->
    <rect x="4" y="4" width="88" height="112" rx="6" fill="#000" opacity="0.3"/>
    <!-- Sheet body -->
    <rect width="88" height="112" rx="6" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
    <!-- Header bar -->
    <rect x="1" y="1" width="86" height="22" rx="5" fill="#38bdf8" opacity="0.15"/>
    <!-- Grid lines -->
    <line x1="30" y1="24" x2="30" y2="110" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>
    <line x1="58" y1="24" x2="58" y2="110" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>
    <line x1="2" y1="44" x2="86" y2="44" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>
    <line x1="2" y1="64" x2="86" y2="64" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>
    <line x1="2" y1="84" x2="86" y2="84" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>
    <!-- Cell highlights -->
    <rect x="4" y="26" width="24" height="16" rx="2" fill="#38bdf8" opacity="0.12"/>
    <rect x="32" y="46" width="24" height="16" rx="2" fill="#38bdf8" opacity="0.12"/>
    <rect x="60" y="66" width="24" height="16" rx="2" fill="#38bdf8" opacity="0.12"/>
    <rect x="4" y="86" width="24" height="16" rx="2" fill="#34d399" opacity="0.12"/>
    <!-- "XL" label -->
    <text x="44" y="16" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="11" font-weight="700" fill="#38bdf8" opacity="0.8">XLSX</text>
  </g>

  <!-- === Arrow 1: Excel → LLM === -->
  <g transform="translate(320, 156)">
    <line x1="8" y1="0" x2="97" y2="0" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <polyline points="88,-7 100,0 88,7" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <text x="50" y="-14" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="11" fill="#64748b">encode</text>
  </g>

  <!-- === LLM Brain (center) === -->
  <g transform="translate(436, 112)">
    <!-- Outer ring glow -->
    <circle cx="44" cy="44" r="52" fill="#818cf8" opacity="0.05"/>
    <circle cx="44" cy="44" r="44" fill="#1e293b" stroke="url(#accent)" stroke-width="1.5"/>
    <!-- Brain/AI symbol — simplified neural nodes -->
    <circle cx="44" cy="30" r="4" fill="#38bdf8" opacity="0.8"/>
    <circle cx="28" cy="44" r="4" fill="#818cf8" opacity="0.8"/>
    <circle cx="60" cy="44" r="4" fill="#818cf8" opacity="0.8"/>
    <circle cx="36" cy="58" r="4" fill="#38bdf8" opacity="0.8"/>
    <circle cx="52" cy="58" r="4" fill="#38bdf8" opacity="0.8"/>
    <!-- Connections -->
    <line x1="44" y1="30" x2="28" y2="44" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
    <line x1="44" y1="30" x2="60" y2="44" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
    <line x1="28" y1="44" x2="36" y2="58" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
    <line x1="60" y1="44" x2="52" y2="58" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
    <line x1="28" y1="44" x2="52" y2="58" stroke="#818cf8" stroke-width="0.5" opacity="0.2"/>
    <line x1="60" y1="44" x2="36" y2="58" stroke="#818cf8" stroke-width="0.5" opacity="0.2"/>
    <line x1="36" y1="58" x2="52" y2="58" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
    <!-- Label -->
    <text x="44" y="80" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="10" fill="#64748b">LLM</text>
  </g>

  <!-- === Arrow 2: LLM → Struct === -->
  <g transform="translate(540, 156)">
    <line x1="8" y1="0" x2="97" y2="0" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <polyline points="88,-7 100,0 88,7" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <text x="50" y="-14" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="11" fill="#64748b">parse</text>
  </g>

  <!-- === Pydantic Struct (right) === -->
  <g transform="translate(656, 100)">
    <!-- Code block shadow -->
    <rect x="4" y="4" width="152" height="112" rx="6" fill="#000" opacity="0.3"/>
    <!-- Code block body -->
    <rect width="152" height="112" rx="6" fill="#1e293b" stroke="url(#green)" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="1" y="1" width="150" height="20" rx="5" fill="#34d399" opacity="0.1"/>
    <!-- Dots -->
    <circle cx="12" cy="11" r="3" fill="#ef4444" opacity="0.6"/>
    <circle cx="24" cy="11" r="3" fill="#eab308" opacity="0.6"/>
    <circle cx="36" cy="11" r="3" fill="#22c55e" opacity="0.6"/>
    <!-- Code lines -->
    <text x="10" y="38" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#c084fc">class</text>
    <text x="42" y="38" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#34d399">Invoice</text>
    <text x="83" y="38" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#94a3b8">(Model):</text>
    <text x="18" y="54" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#94a3b8">name</text>
    <text x="44" y="54" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#64748b">:</text>
    <text x="50" y="54" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#38bdf8"> str</text>
    <text x="18" y="70" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#94a3b8">qty</text>
    <text x="36" y="70" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#64748b">:</text>
    <text x="42" y="70" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#38bdf8"> int</text>
    <text x="18" y="86" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#94a3b8">price</text>
    <text x="48" y="86" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#64748b">:</text>
    <text x="54" y="86" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#38bdf8"> float</text>
    <!-- Checkmark -->
    <g transform="translate(120, 70)">
      <circle cx="12" cy="12" r="12" fill="#34d399" opacity="0.15"/>
      <path d="M6 12 L10 16 L18 8" stroke="#34d399" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- === Title === -->
  <text x="480" y="268" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="36" font-weight="800" fill="white" filter="url(#glow)">
    <tspan fill="url(#accent)">XL</tspan><tspan fill="#e2e8f0">Struct</tspan>
  </text>

  <!-- === Tagline === -->
  <text x="480" y="296" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace" font-size="13" fill="#64748b">
    Schema-driven Excel parsing, powered by LLM
  </text>
</svg>
